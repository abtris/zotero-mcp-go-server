version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: zotero-mcp-go-server
    main: .
    binary: zotero-mcp-go-server
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

dockers:
  - image_templates:
      - "abtris/zotero-mcp-go-server:{{ .Version }}-amd64"
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
    dockerfile: Dockerfile
    goarch: amd64
  - image_templates:
      - "abtris/zotero-mcp-go-server:{{ .Version }}-arm64"
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
    dockerfile: Dockerfile
    goarch: arm64

docker_manifests:
  - name_template: "abtris/zotero-mcp-go-server:{{ .Version }}"
    image_templates:
      - "abtris/zotero-mcp-go-server:{{ .Version }}-amd64"
      - "abtris/zotero-mcp-go-server:{{ .Version }}-arm64"
  - name_template: "abtris/zotero-mcp-go-server:latest"
    image_templates:
      - "abtris/zotero-mcp-go-server:{{ .Version }}-amd64"
      - "abtris/zotero-mcp-go-server:{{ .Version }}-arm64"

brews:
  - name: zotero-mcp-go-server
    repository:
      owner: abtris
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/abtris/zotero-mcp-go-server"
    description: "MCP server for Zotero, written in Go"
    license: "MIT"
    test: |
      system "#{bin}/zotero-mcp-go-server 2>&1 || true"
