version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: zotero-mcp-go-server
    main: .
    binary: zotero-mcp-go-server
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

dockers_v2:
  - images:
      - "abtris/zotero-mcp-go-server"
    tags:
      - "{{ .Version }}"
      - "latest"
    dockerfile: Dockerfile
    platforms:
      - linux/amd64
      - linux/arm64

homebrew_casks:
  - name: zotero-mcp-go-server
    repository:
      owner: abtris
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/abtris/zotero-mcp-go-server"
    description: "MCP server for Zotero, written in Go"
    url:
      verified: github.com/abtris/zotero-mcp-go-server
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/zotero-mcp-go-server"]
          end
